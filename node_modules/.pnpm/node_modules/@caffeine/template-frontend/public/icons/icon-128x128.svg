<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1f3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47B20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e06010;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bgGrad)"/>
  <g opacity="0.07" stroke="#3BBFBF" stroke-width="1" fill="none">
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
  </g>
  <rect x="32" y="38" width="64" height="13" rx="3" fill="url(#tGrad)" filter="url(#glow)"/>
  <rect x="58" y="51" width="13" height="40" rx="3" fill="url(#tGrad)"/>
  <circle cx="96" cy="90" r="5" fill="#2E6DA4" opacity="0.5"/>
</svg>
