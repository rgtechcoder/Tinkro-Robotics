<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1f3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47B20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e06010;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>

  <!-- Subtle circuit grid pattern -->
  <g opacity="0.08" stroke="#3BBFBF" stroke-width="1.5" fill="none">
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <!-- Circuit nodes -->
    <circle cx="80" cy="80" r="4" fill="#3BBFBF"/>
    <circle cx="160" cy="160" r="4" fill="#3BBFBF"/>
    <circle cx="320" cy="80" r="4" fill="#3BBFBF"/>
    <circle cx="400" cy="400" r="4" fill="#3BBFBF"/>
    <circle cx="80" cy="320" r="4" fill="#3BBFBF"/>
    <circle cx="400" cy="160" r="4" fill="#3BBFBF"/>
  </g>

  <!-- Orange glow behind T -->
  <ellipse cx="256" cy="270" rx="120" ry="100" fill="#F47B20" opacity="0.12" filter="url(#glow)"/>

  <!-- T letter mark -->
  <!-- Horizontal bar -->
  <rect x="130" y="155" width="252" height="52" rx="10" fill="url(#tGrad)" filter="url(#glow)"/>
  <!-- Vertical stem -->
  <rect x="230" y="207" width="52" height="158" rx="10" fill="url(#tGrad)"/>

  <!-- Blue accent dot -->
  <circle cx="384" cy="360" r="16" fill="#2E6DA4" opacity="0.6"/>
  <circle cx="128" cy="155" r="8" fill="#3BBFBF" opacity="0.5"/>
</svg>
